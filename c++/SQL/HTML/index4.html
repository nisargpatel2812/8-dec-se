DOCTYPE html> 
<html lang="en">

<head>
    <style>

        table
        {
            border: 10px solid rgb(0, 0, 0);
            border-collapse: collapse;
            width : 100%;
            
        }
        tr,td,th
        {
            text-align : center;
            border: 3px solid blanchedalmond;
            padding: 25px;
        }

        th
        {
            background-color: rgb(245, 52, 226);
            color: rgb(3, 19, 143);
        }

        tr,td
        {
            background-color: rgb(227, 23, 200);
            color: white;
        }
        body 
        {
            background-color: rgb(41, 198, 198);
            padding: 2px;
        }
    </style>
</head>

<body>
    <table>
        <thead>
            <tr>
                <th rowspan="3">Day</th>
                <th colspan="3">Seminar</th>
            </tr>

            <tr>
                <th colspan="2">Schedule</th>
                <th rowspan="2">Topic</th>
            </tr>

            <tr>
                <th>Start</th>
                <th>End</th>
            </tr>
        </thead>

        <tbody>
            <tr>
               <td rowspan="2">Monday</td>
               <td rowspan="2">8:00 AM</td>
               <td rowspan="2">5:00 PM</td>
               <td>Introduction</td>
               
            </tr>

            <tr>
                <td>Uses</td> 
            </tr>

            <tr>
                <td rowspan="4">Tuesday</td>
                <td>8:00 AM</td>
                <td>11:00 PM</td>
                <td>--</td>
            </tr>

            <tr>
                <td>11:00 AM</td>
                <td>2:00 PM</td>
                <td>Learn</td>
            </tr>
            <tr>
                <td>2:00 PM</td>
                <td>8:00 PM</td>
                <td rowspan="2">--</td>
            </tr>
            
            <tr>
                <td>10:00 AM</td>
                <td>1:00 PM</td>
            </tr>

            <tr>
                <td>Wed-Fri</td>
                <td colspan="2">Full Day</td>
                <td>Practical</td>
            </tr>

            <tr>
                <td>Sat-Sun</td>
                <td colspan="2"> 11:00 AM - 5:00 PM</td>
                <td> Extra class</td>
            </tr>


        </tbody>
    </table>
</body>
