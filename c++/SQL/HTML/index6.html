<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        table
        {
            width: 100%;
        }
        tr,td
        {
            padding: 25px;
            background-color: rgb(248, 250, 246);
            border: 3px solid rgb(28, 37, 209);
        }
    </style>
</head>


<body>
    <body>
        <table>
            <tbody>
                <form>
                    <th>
                        -- FORM --
                    </th>
                    <tr>
                        <td><lable>First Name : </lable></td>
                        <td><input type="text" placeholder="Enter First Name : " name="fname" required /></td>
                    </tr>

                    <tr> 
                        <td>
                            <label>Email : </label>
                        </td>
                        <td>
                            <input type="email" placeholder="example@domain.com" name="email" required />
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <lable>Password : </lable>
                        </td>
                        <td>
                            <input type="password" placeholder="Enter Your Password" name="password" required />
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <lable>Gender</lable>

                        </td>
                        <td>
                            <input type="radio" name="gender" value="Male"> Male
                            <input type="radio" name="gender" value="Female"> Female
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <lable>Hobbies </lable>
                        </td>
                        <td>
                            <input type="checkbox" name="c_chk" value="Clanguage"> C language
                            <input type="checkbox" name="j_chk" value="Java"> Java
                            <input type="checkbox" name="p_chk" value="Python"> Python
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>City</label>
                        </td>
                        <td>
                            <select name="city">
                                <option selected disabled readonly>-- Select Any --</option>
                                <option value="Ahemdabad" >Ahemdabad</option>
                                <option value="Rajkot" >Rajkot</option>
                                <option value="Surat" >Surat</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <lable>Address</lable>
                        </td>
                        <td>
                            <textarea rows="10" cols="25" placeholder="type your address"></textarea>
                        </td>
                    </tr>

                    <tr>
                        <td></td>
                        <td><input type="submit" value="SUBMIT" /></td>
                    </tr>
                </form>
            </tbody>
        </table>
    </body>
    
</body>
</html>
